name: Deploy to aaPanel

on:
  push:
    branches: [ main ]   # deploys from main — change to "mailing" here if you deploy from that
  workflow_dispatch: {}  # manual "Run workflow" button in the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Webhook Pull
        run: |
          URL="${{ secrets.AAPANEL_WEBHOOK_URL }}"
          if [ -z "$URL" ]; then
            echo "::error::Secret AAPANEL_WEBHOOK_URL is empty — set it in repo Settings → Secrets → Actions."
            exit 1
          fi

          # NOTE: aaPanel returns HTTP 200 even when the access_key is WRONG (body
          # {"status":false}). So we must inspect the body, not just the HTTP code.
          # -L follows http->https redirect, -k accepts the panel's self-signed cert.
          echo "POSTing to aaPanel webhook…"
          resp=$(curl -sS -L -k -X POST \
                 --connect-timeout 15 --retry 2 --retry-delay 5 \
                 -w $'\n---HTTP %{http_code}---' "$URL")
          echo "$resp"

          # Fail loudly if the panel rejected the key (so the Action goes RED, not a
          # silent green that never deployed).
          if echo "$resp" | grep -qi '"status" *: *false'; then
            echo "::error::aaPanel rejected the call (status:false) — the access_key in AAPANEL_WEBHOOK_URL is wrong or points at the wrong hook."
            exit 1
          fi
          echo "Webhook accepted. Verify in aaPanel → WebHook → sku_auto_pull → Log."
